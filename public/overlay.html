<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamSync Chat Overlay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
    }

    #chat {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 100vh;
      overflow: hidden;
    }

    .msg {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      border-radius: 8px;
      padding: 7px 10px;
      animation: fadeIn 0.2s ease;
      max-width: 420px;
      border-left: 2px solid var(--platform-color, #64748b);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.fade-out {
      animation: fadeOut 0.5s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-4px); }
    }

    .plat-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .body { min-width: 0; }

    .username {
      font-weight: 700;
      font-size: 13px;
      line-height: 1;
      margin-bottom: 3px;
    }

    .text {
      color: #f0f0f0;
      font-size: 14px;
      line-height: 1.35;
      word-break: break-word;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <div id="chat"></div>

  <script>
    const ICONS = {
      tweak:   `<svg viewBox="0 0 24 24" fill="none"><path d="M13 2L4.5 13.5H11L10 22L19.5 10H13L13 2Z" fill="#0ea5e9"/></svg>`,
      twitch:  `<svg viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z" fill="#9147ff"/></svg>`,
      kick:    `<svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm-1.5 17.5V13l-3 4.5H5l4-6-4-6h2.5l3 4.5V6.5h2v5l3-5H18l-4 6 4 6h-2.5l-3-5v5h-2z" fill="#53FC18"/></svg>`,
      tiktok:  `<svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.75a8.18 8.18 0 004.78 1.52V6.82a4.85 4.85 0 01-1.01-.13z" fill="#69C9D0"/></svg>`,
      youtube: `<svg viewBox="0 0 24 24"><path d="M23.495 6.205a3.007 3.007 0 00-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 00.527 6.205a31.247 31.247 0 00-.522 5.805 31.247 31.247 0 00.522 5.783 3.007 3.007 0 002.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 002.088-2.088 31.247 31.247 0 00.5-5.783 31.247 31.247 0 00-.5-5.805zM9.609 15.601V8.408l6.264 3.602z" fill="#FF0000"/></svg>`,
    };

    const COLORS = {
      tweak: '#0ea5e9', twitch: '#9147ff', kick: '#53FC18',
      tiktok: '#69C9D0', youtube: '#FF0000',
    };

    const MAX = 12; // max messages visible at once
    const LIFETIME = 30000; // ms before a message fades out (0 = never)

    const chat = document.getElementById('chat');
    const params = new URLSearchParams(location.search);
    const lifetime = parseInt(params.get('lifetime') ?? LIFETIME);
    const maxMsgs = parseInt(params.get('max') ?? MAX);
    const align = params.get('align') ?? 'left'; // left | right
    if (align === 'right') {
      chat.style.alignItems = 'flex-end';
      document.querySelectorAll('.msg').forEach(m => m.style.marginLeft = 'auto');
    }

    function addMessage(msg) {
      const color = COLORS[msg.platform] || '#64748b';
      const icon = ICONS[msg.platform] || '';

      const el = document.createElement('div');
      el.className = 'msg';
      el.style.setProperty('--platform-color', color);
      if (align === 'right') el.style.marginLeft = 'auto';

      el.innerHTML = `
        <span class="plat-icon">${icon}</span>
        <div class="body">
          <p class="username" style="color:${msg.usernameColor || color}">${esc(msg.username)}</p>
          <p class="text">${esc(msg.message)}</p>
        </div>
      `;

      chat.appendChild(el);

      // Remove oldest if over limit
      while (chat.children.length > maxMsgs) {
        chat.removeChild(chat.firstChild);
      }

      // Auto-fade after lifetime
      if (lifetime > 0) {
        setTimeout(() => {
          el.classList.add('fade-out');
          setTimeout(() => el.remove(), 500);
        }, lifetime);
      }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function connect() {
      const es = new EventSource('/api/chat');
      es.onmessage = (e) => { try { addMessage(JSON.parse(e.data)); } catch {} };
      es.onerror = () => { es.close(); setTimeout(connect, 4000); };
    }

    connect();
  </script>
</body>
</html>
